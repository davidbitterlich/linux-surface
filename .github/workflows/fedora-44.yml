name: Fedora 44

env:
  FEDORA: 44
  GPG_KEY_ID: 56C464BAAC421453
  OCI_REPO: ghcr.io/${{ github.repository }}-fedora

on:
  push:
    tags:
      - 'fedora-44-*'

  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize containers
        run: |
          bash ./.github/scripts/container/create.sh \
            registry.fedoraproject.org/fedora:${{ env.FEDORA }}

      - name: Install build dependencies
        run: |
          bash ./.github/scripts/container/exec.sh \
            -- \
            bash ./.github/scripts/package/fedora.sh setup-builddeps

      - name: Setup secureboot certificate
        env:
          SB_KEY: ${{ secrets.SURFACE_SB_KEY }}
        run: |
          bash ./.github/scripts/container/exec.sh \
            -e SB_KEY \
            -- \
            bash ./.github/scripts/package/fedora.sh setup-secureboot

      - name: Setup swap
        run: |
          sudo fallocate -l 8G /temp_swapfile
          sudo chmod 600 /temp_swapfile
          sudo mkswap /temp_swapfile
          sudo swapon /temp_swapfile
          echo "=== MEMORY STATUS ==="
          free -h
          echo "=== SWAP STATUS ==="
          swapon --show

      - name: Build packages
        run: |
          bash ./.github/scripts/container/exec.sh \
            -- \
            bash ./.github/scripts/package/fedora.sh build-packages

      - name: Sign packages
        env:
          GPG_KEY: ${{ secrets.LINUX_SURFACE_GPG_KEY }}
        run: |
          bash ./.github/scripts/container/exec.sh \
            -e GPG_KEY \
            -e GPG_KEY_ID \
            -- \
            bash ./.github/scripts/package/fedora.sh sign-packages

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: fedora-${{ env.FEDORA }}-latest
          path: pkg/fedora/kernel-surface/out/x86_64

  publish:
    name: Publish release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: fedora-${{ env.FEDORA }}-latest
          path: fedora-${{ env.FEDORA }}-latest

      - name: Create OCI RPM carrier image
        run: |
          mkdir image
          cp ./fedora-${{ env.FEDORA }}-latest/*.rpm image/

          cat > image/Containerfile <<'EOF'
          FROM scratch
          COPY *.rpm /packages/
          EOF

          VERSION="${GITHUB_REF_NAME:-dev}"

          podman build \
            -t ${OCI_REPO,,}:${VERSION}-fc${FEDORA} \
            -t ${OCI_REPO,,}:latest-fc${FEDORA} \
            image

      - name: Login to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Push image
        run: |
          podman push ${OCI_REPO,,}:latest-fc${{ env.FEDORA }}
            